server:
  port: 8082

spring:
  application:
    name: ms-clientes
  datasource:
    url: jdbc:postgresql://localhost:5432/ms_clientes_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true