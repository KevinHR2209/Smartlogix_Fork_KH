server:
  port: 8083

spring:
  application:
    name: ms-ventas
  datasource:
    url: jdbc:postgresql://localhost:5432/ms_ventas_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
springdoc:
  api-docs:
    path: /api/pedidos/v3/api-docs

mercadopago:
  base-url: https://api.mercadopago.com
  access-token: ${MERCADOPAGO_ACCESS_TOKEN:}
  back-url-success: ${MERCADOPAGO_BACK_URL_SUCCESS:http://localhost:3000/pago/exito}
  back-url-failure: ${MERCADOPAGO_BACK_URL_FAILURE:http://localhost:3000/pago/error}
  back-url-pending: ${MERCADOPAGO_BACK_URL_PENDING:http://localhost:3000/pago/pendiente}
  notification-url: ${MERCADOPAGO_NOTIFICATION_URL:}