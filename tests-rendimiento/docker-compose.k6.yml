version: '3.8'

services:

  influxdb:
    image: influxdb:1.8
    container_name: smartlogix-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks:
      - k6-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: smartlogix-grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    networks:
      - k6-network

  k6-smoke:
    image: grafana/k6:latest
    container_name: smartlogix-k6-smoke
    command: run --out influxdb=http://influxdb:8086/k6 /scripts/smoke-test.js
    volumes:
      - ./k6:/scripts
    depends_on:
      - influxdb
    networks:
      - k6-network
    profiles:
      - smoke

  k6-load:
    image: grafana/k6:latest
    container_name: smartlogix-k6-load
    command: run --out influxdb=http://influxdb:8086/k6 /scripts/load-test.js
    volumes:
      - ./k6:/scripts
    depends_on:
      - influxdb
    networks:
      - k6-network
    profiles:
      - load

  k6-stress:
    image: grafana/k6:latest
    container_name: smartlogix-k6-stress
    command: run --out influxdb=http://influxdb:8086/k6 /scripts/stress-test.js
    volumes:
      - ./k6:/scripts
    depends_on:
      - influxdb
    networks:
      - k6-network
    profiles:
      - stress

volumes:
  influxdb_data:
  grafana_data:

networks:
  k6-network:
    driver: bridge