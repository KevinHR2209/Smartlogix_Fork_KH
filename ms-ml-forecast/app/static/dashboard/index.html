<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartLogix · Dashboard de Ventas de Perfumes</title>
<script src="chart.umd.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-border: #2a2e38;
    --text: #e8e9ed;
    --text-dim: #9aa0ab;
    --accent: #7c5cff;
    --accent-2: #22c3a6;
    --danger: #ff5d6c;
    --warning: #ffb020;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px;
  }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px 0; }
  .subtitle { color: var(--text-dim); font-size: 13px; margin: 0 0 20px 0; }

  .filtros {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filtro-btn {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filtro-btn:hover { border-color: var(--accent); color: var(--text); }
  .filtro-btn.activo {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .filtro-custom {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-left: 8px;
  }
  .filtro-custom input {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 13px;
  }

  .kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 16px;
  }
  .kpi-label { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; }
  .kpi-value { font-size: 24px; font-weight: 700; }
  .kpi-value.danger { color: var(--danger); }
  .kpi-sub { color: var(--text-dim); font-size: 11px; margin-top: 4px; }

  .grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 18px;
  }
  .panel h3 { margin: 0 0 14px 0; font-size: 14px; font-weight: 600; color: var(--text-dim); }
  .chart-wrap { position: relative; height: 280px; }
  .chart-wrap.tall { height: 340px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--panel-border); }
  th { color: var(--text-dim); font-weight: 500; font-size: 11px; text-transform: uppercase; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }

  .estado { text-align: center; color: var(--text-dim); padding: 40px; font-size: 13px; }
  .rango-label { color: var(--text-dim); font-size: 12px; }

  @media (max-width: 900px) {
    .grid, .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>Dashboard de Ventas — Catálogo de Perfumes</h1>
<p class="subtitle">SmartLogix · ms-ml-forecast · <span id="rango-actual" class="rango-label"></span></p>

<div class="filtros">
  <button class="filtro-btn" data-periodo="semana">Última semana</button>
  <button class="filtro-btn" data-periodo="mes_anterior">Mes anterior</button>
  <button class="filtro-btn activo" data-periodo="mes_actual">Mes actual</button>
  <button class="filtro-btn" data-periodo="anio">Año</button>
  <div class="filtro-custom">
    <input type="date" id="fecha-inicio">
    <span style="color: var(--text-dim); font-size: 12px;">a</span>
    <input type="date" id="fecha-fin">
    <button class="filtro-btn" id="btn-personalizado" data-periodo="personalizado">Aplicar rango</button>
  </div>
</div>

<div class="kpis">
  <div class="kpi">
    <div class="kpi-label">Unidades vendidas</div>
    <div class="kpi-value" id="kpi-unidades">—</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Ingresos ($ CLP)</div>
    <div class="kpi-value" id="kpi-ingresos">—</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Producto más vendido</div>
    <div class="kpi-value" id="kpi-top" style="font-size: 16px;">—</div>
    <div class="kpi-sub" id="kpi-top-unidades"></div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Días con quiebre de stock</div>
    <div class="kpi-value danger" id="kpi-quiebres">—</div>
  </div>
</div>

<div class="grid">
  <div class="panel">
    <h3>Ventas por día (unidades)</h3>
    <div class="chart-wrap tall"><canvas id="chart-linea"></canvas></div>
  </div>
  <div class="panel">
    <h3>Top 10 productos más vendidos</h3>
    <div style="max-height: 340px; overflow-y: auto;">
      <table id="tabla-top">
        <thead><tr><th>#</th><th>Producto</th><th>Marca</th><th class="num">Unidades</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<div class="grid-2">
  <div class="panel">
    <h3>Ventas por familia olfativa</h3>
    <div class="chart-wrap"><canvas id="chart-familia"></canvas></div>
  </div>
  <div class="panel">
    <h3>Ventas por marca</h3>
    <div class="chart-wrap"><canvas id="chart-marca"></canvas></div>
  </div>
</div>

<script>
const API_BASE = ""; // mismo origen: FastAPI sirve el dashboard y expone /analytics
let periodoActivo = "mes_actual";
let chartLinea, chartFamilia, chartMarca;

const paletteAccent = ["#7c5cff", "#22c3a6", "#ffb020", "#ff5d6c", "#4ea1ff", "#e879f9", "#34d399", "#f97316", "#38bdf8", "#a78bfa"];

function formatoMoneda(v) {
  return new Intl.NumberFormat("es-CL", { style: "currency", currency: "CLP", maximumFractionDigits: 0 }).format(v);
}

function formatoNumero(v) {
  return new Intl.NumberFormat("es-CL").format(v);
}

async function cargarDatos(periodo, fechaInicio, fechaFin) {
  let url = `${API_BASE}/analytics/ventas?periodo=${periodo}`;
  if (periodo === "personalizado" && fechaInicio && fechaFin) {
    url += `&fecha_inicio=${fechaInicio}&fecha_fin=${fechaFin}`;
  }
  const resp = await fetch(url);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ detail: "Error desconocido" }));
    throw new Error(err.detail || "Error al cargar datos");
  }
  return resp.json();
}

function renderKpis(data) {
  document.getElementById("kpi-unidades").textContent = formatoNumero(data.total_unidades);
  document.getElementById("kpi-ingresos").textContent = formatoMoneda(data.total_ingresos);
  document.getElementById("kpi-quiebres").textContent = formatoNumero(data.dias_con_quiebre);

  if (data.top_productos.length > 0) {
    const top = data.top_productos[0];
    document.getElementById("kpi-top").textContent = top.nombre;
    document.getElementById("kpi-top-unidades").textContent = `${formatoNumero(top.unidades)} unidades — ${top.marca}`;
  } else {
    document.getElementById("kpi-top").textContent = "Sin datos";
    document.getElementById("kpi-top-unidades").textContent = "";
  }

  document.getElementById("rango-actual").textContent = `${data.rango[0]} → ${data.rango[1]}`;
}

function renderTablaTop(data) {
  const tbody = document.querySelector("#tabla-top tbody");
  tbody.innerHTML = "";
  data.top_productos.forEach((p, i) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${i + 1}</td><td>${p.nombre}</td><td>${p.marca}</td><td class="num">${formatoNumero(p.unidades)}</td>`;
    tbody.appendChild(tr);
  });
  if (data.top_productos.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="estado">Sin ventas en este período</td></tr>`;
  }
}

function renderChartLinea(data) {
  const ctx = document.getElementById("chart-linea");
  const labels = data.ventas_por_dia.map(d => d.fecha);
  const valores = data.ventas_por_dia.map(d => d.unidades);

  if (chartLinea) chartLinea.destroy();
  chartLinea = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Unidades vendidas",
        data: valores,
        borderColor: "#7c5cff",
        backgroundColor: "rgba(124, 92, 255, 0.15)",
        fill: true,
        tension: 0.3,
        pointRadius: labels.length > 60 ? 0 : 2,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#9aa0ab", maxTicksLimit: 12 }, grid: { color: "#2a2e38" } },
        y: { ticks: { color: "#9aa0ab" }, grid: { color: "#2a2e38" }, beginAtZero: true },
      },
    },
  });
}

function renderChartDona(canvasId, chartVar, labels, valores, tituloLegenda) {
  const ctx = document.getElementById(canvasId);
  if (chartVar) chartVar.destroy();
  const chart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{ data: valores, backgroundColor: paletteAccent, borderWidth: 0 }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: "right", labels: { color: "#e8e9ed", boxWidth: 12, font: { size: 11 } } },
      },
    },
  });
  return chart;
}

async function actualizarDashboard(periodo, fechaInicio, fechaFin) {
  try {
    const data = await cargarDatos(periodo, fechaInicio, fechaFin);
    renderKpis(data);
    renderTablaTop(data);
    renderChartLinea(data);
    chartFamilia = renderChartDona(
      "chart-familia", chartFamilia,
      data.ventas_por_familia.map(f => f.familia),
      data.ventas_por_familia.map(f => f.unidades),
    );
    chartMarca = renderChartDona(
      "chart-marca", chartMarca,
      data.ventas_por_marca.map(m => m.marca),
      data.ventas_por_marca.map(m => m.unidades),
    );
  } catch (e) {
    alert("Error al cargar el dashboard: " + e.message);
    console.error(e);
  }
}

document.querySelectorAll(".filtro-btn[data-periodo]").forEach(btn => {
  btn.addEventListener("click", () => {
    const periodo = btn.dataset.periodo;
    if (periodo === "personalizado") {
      const fi = document.getElementById("fecha-inicio").value;
      const ff = document.getElementById("fecha-fin").value;
      if (!fi || !ff) {
        alert("Selecciona fecha de inicio y fin");
        return;
      }
      periodoActivo = periodo;
      actualizarDashboard(periodo, fi, ff);
    } else {
      document.querySelectorAll(".filtro-btn[data-periodo]").forEach(b => b.classList.remove("activo"));
      btn.classList.add("activo");
      periodoActivo = periodo;
      actualizarDashboard(periodo);
    }
  });
});

// carga inicial: mes actual
actualizarDashboard("mes_actual");
</script>

</body>
</html>
