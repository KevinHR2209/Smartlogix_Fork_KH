version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartlogix-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./smartlogix-infra/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  ms-gateway:
    image: maven:3.9.6-eclipse-temurin-21-alpine
    container_name: ms-gateway
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - ./ms-gateway:/app
      - maven_cache:/root/.m2
    environment:
      - URL_MS_AUTH=http://ms-autenticacion:8085
      - URL_MS_INVENTARIO=http://ms-inventario:8081
      - URL_MS_VENTAS=http://ms-ventas:8083
      - URL_MS_CLIENTES=http://ms-clientes:8082
      - URL_MS_LOGISTICA=http://ms-logistica:8084
      - URL_MS_ML=http://ms-ml-forecast:8086
    command: mvn clean spring-boot:run
    depends_on:
      postgres:
        condition: service_healthy
      ms-autenticacion:
        condition: service_started
      ms-inventario:
        condition: service_started
      ms-ventas:
        condition: service_started
      ms-clientes:
        condition: service_started
      ms-logistica:
        condition: service_started
    develop:
      watch:
        - action: sync+restart
          path: ./ms-gateway/src
          target: /app/src
        - action: sync+restart
          path: ./ms-gateway/pom.xml
          target: /app/pom.xml

  ms-autenticacion:
    image: maven:3.9.6-eclipse-temurin-21-alpine
    container_name: ms-autenticacion
    working_dir: /app
    ports:
      - "8085:8085"
    volumes:
      - ./ms-autenticacion:/app
      - maven_cache:/root/.m2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ms_autenticacion
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - APP_CLIENTES_BASE_URL=http://ms-clientes:8082
    command: mvn clean spring-boot:run
    depends_on:
      postgres:
        condition: service_healthy
      ms-clientes:
        condition: service_started

  ms-inventario:
    image: maven:3.9.6-eclipse-temurin-21-alpine
    container_name: ms-inventario
    working_dir: /app
    ports:
      - "8081:8081"
    volumes:
      - ./ms_inventario:/app
      - maven_cache:/root/.m2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ms_inventario
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    command: mvn clean spring-boot:run
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./ms_inventario/src
          target: /app/src
        - action: sync+restart
          path: ./ms_inventario/pom.xml
          target: /app/pom.xml

  ms-ventas:
    image: maven:3.9.6-eclipse-temurin-21-alpine
    container_name: ms-ventas
    working_dir: /app
    ports:
      - "8083:8083"
    volumes:
      - ./ms-ventas:/app
      - maven_cache:/root/.m2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ms_ventas
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - URL_MS_CLIENTES=http://ms-clientes:8082
      - URL_MS_INVENTARIO=http://ms-inventario:8081
      - MERCADOPAGO_ACCESS_TOKEN=${MERCADOPAGO_ACCESS_TOKEN:-}
      - MERCADOPAGO_BACK_URL_SUCCESS=${MERCADOPAGO_BACK_URL_SUCCESS:-http://localhost:3000/pago/exito}
      - MERCADOPAGO_BACK_URL_FAILURE=${MERCADOPAGO_BACK_URL_FAILURE:-http://localhost:3000/pago/error}
      - MERCADOPAGO_BACK_URL_PENDING=${MERCADOPAGO_BACK_URL_PENDING:-http://localhost:3000/pago/pendiente}
      - MERCADOPAGO_NOTIFICATION_URL=${MERCADOPAGO_NOTIFICATION_URL:-}
    command: mvn clean spring-boot:run
    depends_on:
      postgres:
        condition: service_healthy
      ms-clientes:
        condition: service_started
      ms-inventario:
        condition: service_started
    develop:
      watch:
        - action: sync+restart
          path: ./ms-ventas/src
          target: /app/src
        - action: sync+restart
          path: ./ms-ventas/pom.xml
          target: /app/pom.xml

  ms-clientes:
    image: maven:3.9.6-eclipse-temurin-21-alpine
    container_name: ms-clientes
    working_dir: /app
    ports:
      - "8082:8082"
    volumes:
      - ./ms-clientes:/app
      - maven_cache:/root/.m2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ms_cliente
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    command: mvn clean spring-boot:run
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./ms-clientes/src
          target: /app/src
        - action: sync+restart
          path: ./ms-clientes/pom.xml
          target: /app/pom.xml

  ms-logistica:
    image: maven:3.9.6-eclipse-temurin-21-alpine
    container_name: ms-logistica
    working_dir: /app
    ports:
      - "8084:8084"
    volumes:
      - ./ms-logistica:/app
      - maven_cache:/root/.m2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ms_logistica
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    command: mvn clean spring-boot:run
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./ms-logistica/src
          target: /app/src
        - action: sync+restart
          path: ./ms-logistica/pom.xml
          target: /app/pom.xml

  frontend:
    image: node:20-alpine
    container_name: smartlogix-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - node_modules_cache:/app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - ms-gateway

  ms-ml-forecast:
    build:
      context: ./ms-ml-forecast
    container_name: ms-ml-forecast
    working_dir: /app
    ports:
      - "8086:8086"
    volumes:
      - ./ms-ml-forecast:/app
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/ms_ml_forecast
      - URL_MS_VENTAS=http://ms-ventas:8083
      - URL_MS_INVENTARIO=http://ms-inventario:8081
    command: uvicorn app.main:app --host 0.0.0.0 --port 8086 --reload
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  maven_cache:
  node_modules_cache: