version: '3.8'

services:
  # 1. BASE DE DATOS
  postgres:
    image: postgres:15-alpine
    container_name: smartlogix-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_MULTIPLE_DATABASES: ms_cliente,ms_inventario,ms_ventas,ms_logistica
    ports:
      - "5432:5432"
    volumes:
      - ./smartlogix-infra/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. MICROSERVICIOS
  ms-gateway:
    image: maven:3.9.6-eclipse-temurin-21-alpine
    container_name: ms--gateway
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - ./ms-gateway:/app
      - maven_cache:/root/.m2
    environment:
      - URL_MS_INVENTARIO=http://ms--inventario:8081
      - URL_MS_VENTAS=http://ms--ventas:8083
      - URL_MS_CLIENTES=http://ms--clientes:8082
      - URL_MS_LOGISTICA=http://ms--logistica:8084
    command: mvn spring-boot:run
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./ms-gateway/src
          target: /app/src
        - action: sync+restart
          path: ./ms-gateway/pom.xml
          target: /app/pom.xml

  ms-inventario:
    image: maven:3.9.6-eclipse-temurin-21-alpine
    container_name: ms--inventario
    working_dir: /app
    ports:
      - "8081:8081"
    volumes:
      - ./ms_inventario:/app
      - maven_cache:/root/.m2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ms_inventario
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    command: mvn spring-boot:run
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./ms_inventario/src
          target: /app/src

  ms-ventas:
    image: maven:3.9.6-eclipse-temurin-21-alpine
    container_name: ms--ventas
    working_dir: /app
    ports:
      - "8083:8083"
    volumes:
      - ./ms-ventas:/app
      - maven_cache:/root/.m2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ms_ventas
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    command: mvn spring-boot:run
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./ms-ventas/src
          target: /app/src

  ms-clientes:
    image: maven:3.9.6-eclipse-temurin-21-alpine
    container_name: ms--clientes
    working_dir: /app
    ports:
      - "8082:8082"
    volumes:
      - ./ms-clientes:/app
      - maven_cache:/root/.m2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ms_cliente
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    command: mvn spring-boot:run
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./ms-clientes/src
          target: /app/src

  ms-logistica:
    image: maven:3.9.6-eclipse-temurin-21-alpine
    container_name: ms--logistica
    working_dir: /app
    ports:
      - "8084:8084"
    volumes:
      - ./ms-logistica:/app
      - maven_cache:/root/.m2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ms_logistica
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    command: mvn spring-boot:run
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./ms-logistica/src
          target: /app/src

  # 3. FRONTEND
  frontend:
    image: node:20-alpine
    container_name: smartlogix-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - node_modules_cache:/app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - WATCHPACK_POLLING=true

volumes:
  pgdata:
  maven_cache:
  node_modules_cache: